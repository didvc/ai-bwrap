name: Feature request
description: Suggest an improvement or a new agent
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that ai-bwrap makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What would you like to see? Note that new agents can usually live in
        your own `~/.config/ai-bwrap/config.sh` — see the README.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
